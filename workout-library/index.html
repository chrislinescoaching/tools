<!doctype html>
<html lang="en-NZ">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B2D4A">
<link rel="apple-touch-icon" href="../icon-180.png">
<title>Workout Library — CLC Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:          #0A0B0A;
  --paper:        #F4F2EC;
  --volt:         #DEFF3F;
  --terra:        #C8442A;
  --navy:         #1B2D4A;
  --graphite-50:  #EDEAE2;
  --graphite-100: #E0DCD2;
  --graphite-200: #C9C4B8;
  --graphite-300: #ADA89C;
  --graphite-400: #8F8A7E;
  --graphite-500: #6F6B62;
  --graphite-600: #4F4C46;
  --graphite-700: #34322E;
  --font-sans: 'Geist', ui-sans-serif, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100%;
  background: var(--graphite-100);
  font-family: var(--font-sans);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}
body { padding-bottom: env(safe-area-inset-bottom, 24px); }

/* Header */
.header {
  background: var(--navy);
  border-bottom: 3px solid var(--volt);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.back-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
  background: none; border: none; cursor: pointer;
  color: var(--graphite-300); flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  padding: 0;
  margin-left: -4px;
}
.header-logo { width: 24px; height: 24px; flex-shrink: 0; }
.header-title {
  font-weight: 800; font-size: 15px; letter-spacing: -0.02em;
  color: var(--paper); line-height: 1;
}
.header-sub {
  font-family: var(--font-mono); font-size: 8px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(244,242,236,0.38); margin-top: 3px;
}

/* Category tabs */
.tabs {
  display: flex;
  background: #152338;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.tab {
  flex: 1;
  font-family: var(--font-mono);
  font-size: 8px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(244,242,236,0.35);
  padding: 10px 4px;
  text-align: center;
  cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent;
  transition: color 120ms, border-color 120ms;
  -webkit-tap-highlight-color: transparent;
}
.tab.active { color: var(--volt); border-bottom-color: var(--volt); }

/* Category badge colours */
.badge-fartlek  { background: rgba(91,155,213,0.15); color: #5B9BD5; }
.badge-lt       { background: rgba(237,125,49,0.15);  color: #ED7D31; }
.badge-vo2      { background: rgba(200,68,42,0.15);   color: var(--terra); }

/* Panel */
.panel { display: none; }
.panel.active { display: block; }

/* Session list */
.session-list { display: flex; flex-direction: column; gap: 1px; background: var(--graphite-200); margin: 12px 12px 0; border: 1px solid var(--graphite-200); }

.session-item {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--paper);
  padding: 14px 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 100ms;
  gap: 12px;
}
.session-item:active { background: var(--graphite-50); }

.session-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.session-name {
  font-weight: 600; font-size: 14px;
  letter-spacing: -0.01em; line-height: 1.3;
  color: var(--ink);
}
.session-badge {
  font-family: var(--font-mono); font-size: 8px;
  font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 2px 6px;
  flex-shrink: 0;
}
.session-chevron { color: var(--graphite-300); flex-shrink: 0; }

/* Detail drawer */
.detail-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(10,11,10,0.5);
}
.detail-overlay.open { display: block; }
.detail-sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--paper);
  border-top: 3px solid var(--volt);
  max-height: 75vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 320ms cubic-bezier(0.2,0,0,1);
  padding-bottom: env(safe-area-inset-bottom, 16px);
}
.detail-overlay.open .detail-sheet { transform: translateY(0); }
.detail-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--graphite-100);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.detail-title { font-weight: 800; font-size: 18px; letter-spacing: -0.02em; line-height: 1.2; }
.detail-close {
  background: none; border: none; cursor: pointer;
  color: var(--graphite-400); padding: 0; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.detail-body { padding: 16px; }
.detail-placeholder {
  font-family: var(--font-mono);
  font-size: 10px; color: var(--graphite-400);
  letter-spacing: 0.06em; text-transform: uppercase;
  text-align: center; padding: 32px 0;
  border: 1px dashed var(--graphite-200);
}
</style>
</head>
<body>

<header class="header">
  <button class="back-btn" onclick="window.location='../'" aria-label="Back">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"><path d="M15 6l-6 6 6 6"/></svg>
  </button>
  <svg class="header-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#1B2D4A"/>
    <line x1="14" y1="14" x2="50" y2="14" stroke="#F4F2EC" stroke-width="10" stroke-linecap="square"/>
    <line x1="14" y1="14" x2="14" y2="86" stroke="#F4F2EC" stroke-width="10" stroke-linecap="square"/>
    <line x1="14" y1="86" x2="70" y2="86" stroke="#F4F2EC" stroke-width="10" stroke-linecap="square"/>
    <rect x="36" y="44" width="12" height="12" fill="#DEFF3F"/>
  </svg>
  <div>
    <div class="header-title">Workout Library</div>
    <div class="header-sub">Chris Lines Coaching</div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('fartlek',this)">Fartlek</button>
  <button class="tab" onclick="switchTab('lt',this)">Lactate Thresh</button>
  <button class="tab" onclick="switchTab('vo2',this)">VO2 Max</button>
</div>

<!-- FARTLEK -->
<div id="panel-fartlek" class="panel active">
  <div class="session-list" id="list-fartlek"></div>
</div>

<!-- LT -->
<div id="panel-lt" class="panel">
  <div class="session-list" id="list-lt"></div>
</div>

<!-- VO2 -->
<div id="panel-vo2" class="panel">
  <div class="session-list" id="list-vo2"></div>
</div>

<!-- Detail drawer -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-sheet" id="detailSheet">
    <div class="detail-header">
      <div class="detail-title" id="detailTitle"></div>
      <button class="detail-close" onclick="closeDrawer()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="detail-body">
      <div class="detail-placeholder">Session description coming soon</div>
    </div>
  </div>
</div>

<script>
const SESSIONS = {
  fartlek: [
    '(3,2,1)×2',
    '10×2min',
    '15×1′–1″',
    '2,3,4,4,3,2,1,1,1',
    '5×2′ + 5×1′',
    'Mona Fartlek',
    'Moose Fartlek',
    'Telford Fartlek',
  ],
  lt: [
    '20′, 3×5′, 5×2′',
    '2×5km',
    '2×5km + 5×1′,1′',
    '3×3km Threshold (long recoveries)',
    '3×3km Threshold (jog recoveries)',
    '4,3,2,1km',
    '5×6min Threshold',
    '6×6min LT',
    '7×2km + 5×1km',
    'Progressive Tempo',
  ],
  vo2: [
    '10×1km',
    '10×400m',
    '20min + 3×1km',
    '5km Time Trial',
    '5×2km',
    '5×400m at 5km pace',
    '6×1km + 5×200m',
    '8×1km',
    'Park Run',
  ],
};

const BADGE = {
  fartlek: { label: 'Fartlek',  cls: 'badge-fartlek' },
  lt:      { label: 'LT',       cls: 'badge-lt' },
  vo2:     { label: 'VO2 Max',  cls: 'badge-vo2' },
};

function buildList(cat) {
  const el = document.getElementById('list-' + cat);
  const b  = BADGE[cat];
  el.innerHTML = SESSIONS[cat].map(name => `
    <div class="session-item" onclick="openDrawer('${name.replace(/'/g,"\\'")}')">
      <div class="session-left">
        <span class="session-badge ${b.cls}">${b.label}</span>
        <span class="session-name">${name}</span>
      </div>
      <svg class="session-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"><path d="M9 6l6 6-6 6"/></svg>
    </div>`).join('');
}

function switchTab(cat, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + cat).classList.add('active');
}

function openDrawer(name) {
  document.getElementById('detailTitle').textContent = name;
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeDetail(e) {
  if (e.target === document.getElementById('detailOverlay')) closeDrawer();
}

buildList('fartlek');
buildList('lt');
buildList('vo2');
</script>
</body>
</html>
